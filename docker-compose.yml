version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    image: symfony_new_app:latest
    container_name: symfony_new_app
    volumes:
      - ./backend:/var/www/html
    expose:
      - "9000"
    depends_on:
      - db
    networks:
      - app-network

  nginx:
    image: nginx:latest
    container_name: symfony_new_nginx
    ports:
      - "8084:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend:/var/www/html
    depends_on:
      - app
    networks:
      - app-network

  db:
    image: mysql:8
    container_name: symfony_new_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: symfony_new
      MYSQL_USER: symfony
      MYSQL_PASSWORD: symfony
    ports:
      - "3310:3306"
    networks:
      - app-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: symfony_new_phpmyadmin
    environment:
      PMA_HOST: symfony_new_mysql
      PMA_USER: symfony
      PMA_PASSWORD: symfony
    ports:
      - "8085:80"
    depends_on:
      - db
    networks:
      - app-network

networks:
  app-network:
    driver: bridge